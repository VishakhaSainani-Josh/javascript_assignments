<!-- Given the above html, find out what happens when you try to access the element h1 in javascript (using document.getElementById) 
 and change its content to “Goodbye World” when the script is attached: 
● in the head tag  -->
<html>
  <head>
    <title></title>
    <script>
      document.getElementById("test").innerHTML = "GoodBye World!";
    </script>
  </head>
  <body>
    <h1 id="test">Hello World!</h1>
  </body>
</html>

<!-- This won't affect the output, it will be Hello World only because the head section executes before the body and since 
 there's no h1 tag with id test yet created it won't affect the output -->
